    <!-- Tipografía Profesional: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. ESTILOS BASE Y POSICIONAMIENTO ELEVADO
           ========================================= */
        body { 
            margin: 0; 
            padding: 6vh 20px 8vh 20px; /* Eleva la tarjeta para dejar ver el fondo abajo */
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Alineación superior corregida */
            min-height: 100vh; 
            background-color: transparent; 
        }

        /* =========================================
           2. FONDO ANIMADO MULTICOLOR (ÓRBITA COMPLETA)
           ========================================= */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            /* Paleta de alto impacto solicitada */
            background: linear-gradient(135deg, #FF0055, #FFC300, #00E5FF, #2962FF, #FF0055);
            background-size: 400% 400%; /* Incrementado para mayor rango de movimiento */
            animation: gradientAnimation 10s ease-in-out infinite; /* Velocidad óptima ajustada */
        }

        /* Trayectoria corregida en 4 puntos para forzar la transición de TODOS los colores en móvil */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        
        /* =========================================
           3. CONTENEDOR PRINCIPAL (ESTILO PREMIUM DARK)
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
            background: #111111; 
            padding: 40px 25px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        
        /* =========================================
           4. FOTO DE PERFIL CON AJUSTE MANUAL
           ========================================= */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #222; 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            /* 
               AJUSTE MANUAL DE LA FOTO:
               Modifica el '25%' para calibrar la altura. 
               Menor porcentaje sube la foto, mayor porcentaje la baja.
            */
            object-position: center 25%; 
        }
        
        /* =========================================
           5. TIPOGRAFÍA Y IDENTIDAD
           ========================================= */
        h1 { 
            font-size: 1.5rem; 
            font-weight: 900; 
            margin: 0 0 8px 0; 
            letter-spacing: -0.5px; 
            line-height: 1.2;
            color: #ffffff;
            text-transform: uppercase;
        }
        
        .title-sub { 
            color: #888888; 
            font-size: 0.85rem; 
            font-weight: 600;
            margin: 0 0 30px 0; 
            letter-spacing: 0.5px;
        }
        
        .section-title {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin: 25px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        
        /* =========================================
           6. BOTONES ESTILO PASTILLA DE ALTA GAMA
           ========================================= */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            background: #1c1c1c; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            text-decoration: none; 
            padding: 16px; 
            margin-bottom: 14px; 
            border-radius: 50px; /* Estilo píldora perfecto */
            font-size: 0.95rem; 
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            cursor: pointer;
        }
        
        .btn:hover, .btn:active { 
            background: #252525; 
            transform: translateY(-4px) scale(1.02); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        /* =========================================
           7. ICONOS SVG (SÓLIDOS CON HERENCIA DE COLOR)
           ========================================= */
        .icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            fill: currentColor; 
            flex-shrink: 0;
        }

        /* Fila de Redes Sociales Inferior (Solo Iconos) */
        .social-icons-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 5px;
            padding-top: 15px;
        }

        .social-icon {
            display: inline-flex;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease;
            color: #666666; /* Tono neutro inicial */
        }

        .social-icon svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* Efecto dinámico al pasar el dedo o cursor en las redes */
        .social-icon:hover, .social-icon:active {
            transform: scale(1.2);
            color: #ffffff; /* Enciende a blanco puro */
        }
    </style>
