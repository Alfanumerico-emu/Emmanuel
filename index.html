        /* =========================================
           1. ESTILOS BASE
           ========================================= */
        body { 
            margin: 0; 
            padding: 40px 20px; 
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #050505; 
            overflow-x: hidden;
        }

        /* =========================================
           2. CANVAS DE FONDO EFECTO PIPELINE NATIVO
           ========================================= */
        #pipeline-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #050505;
        }
        
        /* =========================================
           3. CONTENEDOR PRINCIPAL REFINADO (GLASSMORPHISM)
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 355px; /* Sutilmente estrechado para lucir el efecto Pipeline en los lados */
            background: rgba(17, 17, 17, 0.74); /* Transparencia equilibrada */
            padding: 40px 25px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            box-sizing: border-box;
            backdrop-filter: blur(12px); /* Difumina las líneas de neón al pasar por detrás */
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* =========================================
           4. FOTO DE PERFIL CIRCULAR
           ========================================= */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #222; 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 30%; 
        }

        }

            font-size: 0.8rem; 
            font-weight: 600;
            margin: 0 0 25px 0; 
            text-transform: uppercase;
            letter-spacing: 1.5px;

        }
