    <!-- Tipografía Profesional: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. ESTILOS BASE
           ========================================= */
        body { 
            margin: 0; 
            padding: 40px 20px; 
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: transparent; 
        }

        /* =========================================
           2. FONDO ANIMADO MULTICOLOR CORREGIDO
           ========================================= */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
            /* Gradiente con Rojo intenso, Amarillo vibrante, Cyan y Azul profundo */
            background: linear-gradient(135deg, #FF0055, #FFC300, #00E5FF, #2962FF, #FF0055);
            background-size: 300% 300%;
            animation: gradientAnimation 15s ease-in-out infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* =========================================
           3. CONTENEDOR PRINCIPAL (TARJETA MÓVIL)
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
            background: #111111; 
            padding: 40px 25px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            box-sizing: border-box;
        }
        
        /* =========================================
           4. FOTO DE PERFIL CIRCULAR
           ========================================= */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #222; 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 30%; 
        }
        
        /* =========================================
           5. TIPOGRAFÍA Y TÍTULOS
           ========================================= */
        h1 { 
            font-size: 1.6rem; 
            font-weight: 800; 
            margin: 0 0 6px 0; 
            letter-spacing: -0.5px; 
            color: #ffffff;
        }
        
        .institution { 
            color: #888888; 
            font-size: 0.8rem; 
            font-weight: 600;
            margin: 0 0 25px 0; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .section-title {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777;
            margin: 30px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }
        
        /* =========================================
           6. BOTONES E INTERACTIVIDAD REFINADA
           ========================================= */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            background: #1c1c1c; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            text-decoration: none; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 14px; 
            font-size: 0.95rem; 
            font-weight: 600;
            /* Transición más lenta y suave para mejor percepción */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            cursor: pointer;
        }
        
        .btn:hover { 
            background: #2a2a2a; 
            /* Desplazamiento más notorio y aumento de escala */
            transform: translateY(-4px) scale(1.02); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        /* =========================================
           7. ICONOS SVG Y WIDGET
           ========================================= */
        .icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            fill: currentColor; 
            flex-shrink: 0;
        }

        .spotify-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
    </style>
</head>
