    <!-- =========================================
       8. MOTOR JAVASCRIPT DE EFECTO PIPELINE (NATIVO)
       ========================================= -->
    <script>
        const canvas = document.getElementById('pipeline-canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Paleta exacta de Almendra
        const colors = ['#FF0055', '#FFC300', '#00E5FF', '#2962FF'];
        const totalPipes = 20;
        const pipes = [];

        class Pipeline {
            constructor() {
                this.init();
            }

            init() {
                // Forzar distribución alineada a una rejilla virtual de 20px
                this.x = Math.floor(Math.random() * (width / 20)) * 20;
                this.y = Math.floor(Math.random() * (height / 20)) * 20;
                this.speed = 2;
                
                // Direcciones ortogonales (arriba, derecha, abajo, izquierda)
                const directions = [[0, -1], [1, 0], [0, 1], [-1, 0]];
                this.dir = directions[Math.floor(Math.random() * directions.length)];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.currentLength = 0;
                this.maxLength = Math.random() * 200 + 60;
            }

            update() {
                this.x += this.dir[0] * this.speed;
                this.y += this.dir[1] * this.speed;
                this.currentLength += this.speed;

                // Si excede la longitud del segmento o sale de la pantalla, gira o se reinicia
                if (this.currentLength > this.maxLength || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    if (Math.random() < 0.6) {
                        // Giro de 90 grados estilo circuito Pipeline
                        this.dir = [-this.dir[1], this.dir[0]];
                        if (Math.random() < 0.5) this.dir = [-this.dir[0], -this.dir[1]];
                        this.currentLength = 0;
                        this.maxLength = Math.random() * 200 + 60;
                    } else {
                        this.init();
                    }
                }
            }

            draw() {
                ctx.beginPath();
                // Renderizado con sutil resplandor de neón digital
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 2.5, 2.5);
                ctx.shadowBlur = 0; // Apagar sombra para optimizar rendimiento de GPU
            }
        }

        // Generar pool de tuberías
        for (let i = 0; i < totalPipes; i++) {
            pipes.push(new Pipeline());
        }

        // Loop de animación a 60fps con efecto estela (fade out)
        function render() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.06)'; // Crea el rastro fluido
            ctx.fillRect(0, 0, width, height);

            pipes.forEach(pipe => {
                pipe.update();
                pipe.draw();
            });

            requestAnimationFrame(render);
        }

        render();
    </script>
