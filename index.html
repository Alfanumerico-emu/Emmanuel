    <style>
        /* =========================================
           1. ESTILOS BASE Y FONDO ANIMADO (GRISES/NEGRO)
           ========================================= */
        body { 
            margin: 0; 
            padding: 40px 20px; 
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            
            /* Animación de Gradiente en tonos grises oscuros */
            background: linear-gradient(-45deg, #000000, #1f1f1f, #0a0a0a, #2a2a2a);
            background-size: 400% 400%;
            animation: gradientBackground 12s ease infinite;
        }

        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* =========================================
           2. ESTRUCTURA DE LA TARJETA
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
            background: #121212; 
            padding: 40px 25px;
            border-radius: 20px; /* Borde redondeado estricto a 20px */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        
        /* =========================================
           3. FOTO DE PERFIL (CONTENEDOR Y AJUSTE)
           ========================================= */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #222; 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            
            /* ========================================================
               ⬇️ AQUÍ AJUSTAS LA POSICIÓN DE TU FOTO ⬇️
               El primer valor (center) es izquierda/derecha.
               El segundo valor (30%) es arriba/abajo.
               - Si quieres la foto MÁS ARRIBA, baja el % (ej. 10% o 0%).
               - Si quieres la foto MÁS ABAJO, sube el % (ej. 50% o 80%).
               ======================================================== */
            object-position: center 30%; 
        }
        
        /* =========================================
           4. TIPOGRAFÍA
           ========================================= */
        h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            margin: 0 0 6px 0; 
            letter-spacing: -0.5px; 
            color: #ffffff;
        }
        
        .institution { 
            color: #8a8a93; 
            font-size: 0.8rem; 
            font-weight: 600;
            margin: 0 0 30px 0; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        /* =========================================
           5. SEPARADORES DE SECCIÓN
           ========================================= */
        .section-title {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777;
            margin: 30px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }
        
        /* =========================================
           6. BOTONES (ESTILOS GENERALES Y HOVER)
           ========================================= */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            background: #1c1c1c; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            text-decoration: none; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 14px; 
            font-size: 0.95rem; 
            font-weight: 600;
            transition: all 0.3s ease; 
            cursor: pointer;
        }
        
        .btn:hover { 
            background: #2a2a2a; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Botón Destacado Blanco */
        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
        }
        .btn-primary:hover {
            background: #e6e6e6;
        }
        
        /* =========================================
           7. ICONOS VECTORIALES (SVG Sólidos)
           ========================================= */
        .icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            fill: currentColor; 
            flex-shrink: 0;
        }

        /* =========================================
           8. ANIMACIONES DE ENTRADA
           ========================================= */
        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spotify-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
        }
    </style>

        function downloadVCard() {
            const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:Emmanuel Magallanes Ulloa
ORG:UPZ
TITLE:Académico / Investigador
TEL;TYPE=WORK,VOICE:+524931912255
EMAIL;TYPE=WORK:emagallanes@upz.edu.mx
EMAIL;TYPE=HOME:emagallanes.u2@gmail.com
URL:https://www.researchgate.net/profile/Emmanuel-Magallanes
END:VCARD`;

            const blob = new Blob([vcardData], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "Emmanuel_Magallanes.vcf"; 
            document.body.appendChild(a);
            a.click(); 
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
