    <style>
        /* =========================================
           1. ESTILOS BASE Y FONDO OSCURO ANIMADO
           ========================================= */
        body { 
            margin: 0; 
            padding: 40px 20px; /* Padding extra para PC */
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            
            /* Fondo base negro con "Aurora oscura" animada */
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(30, 35, 50, 0.7), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(20, 25, 40, 0.8), transparent 50%);
            background-size: 200% 200%;
            animation: darkAurora 12s ease-in-out infinite alternate;
        }

        /* Animación suave del gradiente oscuro */
        @keyframes darkAurora {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        
        /* =========================================
           2. ESTRUCTURA DE LA TARJETA (Vista Móvil en PC)
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 360px; /* Restringe el ancho en PC para simular un celular */
            background: #121215; /* Gris casi negro, muy elegante */
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        
        /* =========================================
           3. FOTO DE PERFIL 
           ========================================= */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #222; /* Fondo de carga */
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            /* AQUÍ BAJAS O SUBES LA FOTO: 
               El primer valor (center) es horizontal. 
               El segundo valor (15%) es vertical. Aumenta a 20% o 30% si necesitas bajarla más. */
            object-position: center 15%; 
        }
        
        /* =========================================
           4. TIPOGRAFÍA (Nombres y Títulos)
           ========================================= */
        h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            margin: 0 0 6px 0; 
            letter-spacing: -0.5px; 
            color: #ffffff;
        }
        
        .institution { 
            color: #8a8a93; 
            font-size: 0.8rem; 
            font-weight: 600;
            margin: 0 0 30px 0; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        /* =========================================
           5. SEPARADORES DE SECCIÓN
           ========================================= */
        .section-title {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin: 30px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }
        
        /* =========================================
           6. BOTONES E INTERACTIVIDAD
           ========================================= */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            background: #1c1c21; /* Botones oscuros */
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            text-decoration: none; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 14px; 
            font-size: 0.95rem; 
            font-weight: 600;
            transition: all 0.2s ease-in-out; 
            cursor: pointer;
        }
        
        .btn:hover { 
            background: #2a2a32; 
            transform: scale(1.02); /* Crecimiento sutil al pasar el mouse en PC */
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Botón Blanco Destacado (vCard) basado en tu imagen */
        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            border-radius: 14px;
        }
        .btn-primary:hover {
            background: #e6e6e6;
            transform: scale(1.02);
        }
        
        /* =========================================
           7. CONFIGURACIÓN DE SVGs
           ========================================= */
        .icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            fill: currentColor; /* El vector hereda el color del texto del botón */
            flex-shrink: 0;
        }

        /* =========================================
           8. ANIMACIONES ESCALONADAS
           ========================================= */
        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contenedor fluido para el iFrame de Spotify */
        .spotify-container {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            margin-top: 10px;
        }
    </style>

    <!-- SCRIPT DE DESCARGA VCARD -->
    <script>
        function downloadVCard() {
            const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:Emmanuel Magallanes Ulloa
ORG:UPZ
TITLE:Académico / Investigador
TEL;TYPE=WORK,VOICE:+524931912255
EMAIL;TYPE=WORK:emagallanes@upz.edu.mx
EMAIL;TYPE=HOME:emagallanes.u2@gmail.com
URL:https://www.researchgate.net/profile/Emmanuel-Magallanes
END:VCARD`;

            const blob = new Blob([vcardData], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "Emmanuel_Magallanes.vcf"; 
            document.body.appendChild(a);
            a.click(); 
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
