    <style>
        /* =========================================
           1. ESTILOS BASE Y FONDO (Animated Mesh Gradient)
           ========================================= */
        body { 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; /* Tipografía profesional aplicada */
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            
            /* Fondo Animado Estilo Gemini (Aurora/Mesh) */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite; /* Llama a la animación de abajo */
        }

        /* Animación fluida del fondo */
        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* =========================================
           2. ESTRUCTURA PRINCIPAL (La Tarjeta)
           ========================================= */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 340px; 
            background: rgba(10, 10, 10, 0.6); /* Fondo semi-transparente estilo Glassmorphism */
            backdrop-filter: blur(15px); /* Desenfoque detrás de la tarjeta */
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* =========================================
           3. FOTO DE PERFIL Y CABECERA
           ========================================= */
        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Mantiene la proporción sin aplastar la imagen */
        }
        
        h1 { 
            font-size: 1.4rem; 
            font-weight: 800; /* Peso grueso para el nombre */
            margin: 0 0 5px 0; 
            letter-spacing: -0.5px; 
        }
        
        .institution { 
            color: #a8a8b3; 
            font-size: 0.85rem; 
            font-weight: 500;
            margin: 0 0 25px 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* =========================================
           4. SEPARADORES Y TEXTOS SECUNDARIOS
           ========================================= */
        .section-title {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin: 25px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        
        /* =========================================
           5. BOTONES E INTERACTVIDAD
           ========================================= */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff; 
            text-decoration: none; 
            padding: 14px 18px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: all 0.3s ease; /* Transición suave */
            cursor: pointer;
        }
        
        /* Efecto Hover: Cambia al pasar el cursor o presionar */
        .btn:hover, .btn:active { 
            background: rgba(255, 255, 255, 0.15); 
            transform: translateY(-3px); /* Levanta el botón ligeramente */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Botón Destacado (vCard) */
        .btn-primary {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #e0e0e0;
            color: #000000;
        }
        
        /* =========================================
           6. ICONOS VECTORIALES (SVG)
           ========================================= */
        .icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            fill: currentColor; /* El SVG adopta el color del texto del botón */
            flex-shrink: 0;
        }

        /* =========================================
           7. ANIMACIONES DE ENTRADA ESCALONADA (Staggered)
           ========================================= */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Módulos de Spotify */
        .spotify-container {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>

    <script>
        function downloadVCard() {
            // Construimos la estructura de datos vCard (versión 3.0)
            const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:Emmanuel Magallanes Ulloa
ORG:UPZ
TITLE:Académico / Investigador
TEL;TYPE=WORK,VOICE:+52 493 191 2255
EMAIL;TYPE=WORK:emagallanes@upz.edu.mx
EMAIL;TYPE=HOME:emagallanes.u2@gmail.com
URL:https://www.researchgate.net/profile/Emmanuel-Magallanes
END:VCARD`;

            // Creamos un Blob (archivo binario temporal en memoria)
            const blob = new Blob([vcardData], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            // Creamos una etiqueta <a> invisible para forzar la descarga
            const a = document.createElement('a');
            a.href = url;
            a.download = "Emmanuel_Magallanes.vcf"; // Nombre del archivo
            document.body.appendChild(a);
            a.click(); // Simulamos el clic
            
            // Limpiamos el HTML removiendo el botón temporal
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
